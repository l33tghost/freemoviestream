<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WatchDen - Watch Movies & TV Shows Online</title>
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="WatchDen - Stream movies, TV shows, and anime online in one place." />
    <meta name="keywords" content="movies, TV shows, streaming, anime, entertainment, watch online">
    <meta name="author" content="WatchDen">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://watchden.com">
    <meta property="og:title" content="WatchDen - Watch Movies & TV Shows Online">
    <meta property="og:description" content="Stream movies, TV shows, and anime in one place.">
    <meta property="og:image" content="https://watchden.com/img/landingpage.webp">
    <meta property="og:site_name" content="WatchDen">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://watchden.com">
    <meta property="twitter:title" content="WatchDen - Watch Movies & TV Shows Online">
    <meta property="twitter:description" content="Stream movies, TV shows, and anime in one place.">
    <meta property="twitter:image" content="https://watchden.com/img/landingpage.webp">

    <meta name="theme-color" content="#141414">
    <link rel="canonical" href="https://watchden.com">

    <!-- Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "WatchDen",
      "url": "https://watchden.com",
      "description": "Stream movies and TV shows online",
      "publisher": {
        "@type": "Organization",
        "name": "WatchDen",
        "logo": {
          "@type": "ImageObject",
          "url": "https://watchden.com/watchden-logo1x1.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://watchden.com/search?query={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="manifest" href="/config/manifest.json">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #ffffff;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
      }

      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .logo-text {
        color: #e50914;
        font-size: 2rem;
        font-weight: 700;
        animation: pulse-glow 2s infinite;
      }

      @keyframes pulse-glow {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div class="loading-screen">
      <div class="logo-text">WATCHDEN</div>
    </div>

    <script>
      setTimeout(() => {
        const loadingScreen = document.querySelector('.loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.5s ease';
          setTimeout(() => loadingScreen.remove(), 500);
        }
      }, 2000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
